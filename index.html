<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA252 - Two Columns</title>
    <style>
        /* In meesha laga saaro space-ka dabiiciga ah ee browser-ka */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Qaybta sare ee horyaalka */
        .header {
            background-color: #cbd46a; /* Midabka khaki-ga xagga sare */
            padding: 20px;
            text-align: center;
            font-size: 30px;
            color: #555;
        }

        /* weelka isku haya labada dhinac ee barbar taagan */
        .container {
            display: flex;
        }

        /* Menu-da bidixda ku taal */
        .menu {
            width: 20%;
            background-color: #e67e22; /* Midabka orange-ga */
            height: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        .menu ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .menu ul li {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            cursor: pointer;
        }

        /* Qaybta weyn ee fariinta iyo qoraalka */
        .content {
            width: 80%;
            background-color: #db7093; /* Midabka pink-ga ah ee admin page */
            height: 450px;
            padding: 40px;
            box-sizing: border-box;
            color: white;
        }

        .content h1 {
            font-size: 35px;
            margin-top: 0;
        }

        .content p {
            font-size: 18px;
            line-height: 1.6;
        }

        /* Qaybta ugu hooseysa (Footer) */
        .footer {
            background-color: #e67e22; /* Midabka orange-ga hoose */
            padding: 15px;
            text-align: center;
            color: white;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        Welcome to CA252
    </div>

    <div class="container">
        
        <div class="menu">
            <ul>
                <li><a href="">home</a></li>
                <li> <a href="cali.html">about</a></li>
                <li> <a href="shuceyb.html">news</a></li>
                <li><a href="shiine.html">contact</a></li>
            </ul>
        </div>
        
        <div class="content">
            <h1>Welcome to Admin page</h1>
            <p>You are using the System</p>
            <p style="color: #f1c40f;">Do not share your email and password to anyone</p>
        </div>

    </div>

    <div class="footer">
        All Copyright received by CA252
    </div>

</body>
</html>
